<!DOCTYPE html>
<html>
<head>
    <title>Simple Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Simple Chatbot</h1>

    <div class="container">

        <div id="chat-box"></div>

        <div class="input-area">

            <input
                type="text"
                id="message-input"
                placeholder="Type a message..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
