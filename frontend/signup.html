<!DOCTYPE html>
<html>

<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-container">

        <h1>Sign Up</h1>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="signup()">
            Sign Up
        </button>

        <p id="message"></p>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

    <script src="signup.js"></script>

</body>

</html>
